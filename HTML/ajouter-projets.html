<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajouter un projet</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <header>
        <h1>Mon Portfolio</h1>
        <p>Gestion de projets - TP HTML / CSS</p>
    </header>

    <nav>
        <a href="index.html">Accueil</a>
        <a href="lister-projets.html">Liste des projets</a>
        <a href="ajouter-projet.html">Ajouter un projet</a>
    </nav>

    <main>
        <h2>Ajouter un nouveau projet</h2>
        
        <form>
            <label>Libellé du projet :</label><br>
            <input type="text" placeholder="Ex: Site E-commerce"><br><br>

            <label>Description :</label><br>
            <textarea rows="5" placeholder="Décrivez le projet..."></textarea><br><br>

            <label>URL de l'image :</label><br>
            <input type="text" placeholder="https://... ou chemin local"><br><br>

            <label>Technologies utilisées (séparées par virgule) :</label><br>
            <input type="text" placeholder="HTML, CSS, JavaScript"><br><br>

            <button type="submit" class="btn-ajouter">Ajouter le projet</button>
        </form>
    </main>

    <footer>
        <p>&copy; 2026 - TP HTML/CSS - Mairam Baidy Sow</p>
    </footer>
</body>
</html>
