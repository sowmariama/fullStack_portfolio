<!doctype html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajouter un projet - Mairam Baidy Sow</title>
    <link href="./dist/output.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-slate-50">

    <nav class="bg-gray-900 border-b-4 border-blue-600 py-5">
        <div class="max-w-7xl mx-auto px-6 flex items-center justify-between">
            <a href="lister-projets.html" class="text-2xl font-bold text-white">MBS</a>
            <div class="flex gap-8 text-white">
                <a href="lister-projets.html" class="hover:text-blue-400">Projets</a>
            </div>
            <a href="lister-projets.html" class="bg-white text-slate-800 hover:bg-slate-100 px-6 py-3 rounded-2xl font-medium">
                ← Retour
            </a>
        </div>
    </nav>

    <div class="max-w-2xl mx-auto px-6 py-12">
        <h1 class="text-4xl font-bold text-slate-800 mb-2">Ajouter un nouveau projet</h1>
        <p class="text-slate-600 mb-10">Mairam Baidy Sow - Groupe 1 AWS re/Start</p>

        <form id="form-ajouter-projet" class="bg-white shadow-xl rounded-3xl p-10 space-y-8">

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">Titre du projet</label>
                <input type="text" id="titre" class="w-full px-5 py-4 border border-slate-300 rounded-2xl focus:outline-none focus:border-blue-600" placeholder="Ex: CI/CD avec GitHub Actions" required>
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">Description</label>
                <textarea id="description" rows="5" class="w-full px-5 py-4 border border-slate-300 rounded-2xl focus:outline-none focus:border-blue-600" placeholder="Décrivez le projet..." required></textarea>
            </div>

            
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">Image du projet</label>
                <input type="file" id="imageFile" accept="image/*" class="w-full px-5 py-4 border border-slate-300 rounded-2xl focus:outline-none focus:border-blue-600">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">Technologies utilisées (séparées par virgule)</label>
                <input type="text" id="technologies" class="w-full px-5 py-4 border border-slate-300 rounded-2xl focus:outline-none focus:border-blue-600" placeholder="GitHub Actions, AWS EC2, Docker, ...">
            </div>

            <div class="flex gap-4 pt-6">
                <button type="button" onclick="window.location.href='lister-projets.html'" class="flex-1 bg-white border border-slate-300 text-slate-700 py-4 rounded-2xl font-medium hover:bg-slate-50">
                    Annuler
                </button>
                
                <button type="submit" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-medium">
                    Ajouter le projet
                </button>
            </div>
        </form>
    </div>

    <footer class="bg-gray-900 text-white py-10">
        <div class="max-w-7xl mx-auto px-6 text-center">
            <p class="text-slate-400">© 2026 Mairam Baidy Sow - Groupe 1 AWS re/Start</p>
        </div>
    </footer>

    <script src="./src/js/app.js"></script>
</body>
</html>
